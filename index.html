<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>51Talk - Local Background Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #referral-card {
            position: relative;
            width: 100%;
            max-width: 550px;
            border-radius: 3.5rem;
            overflow: hidden;
            background: #ffffff;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
        }

        /* استدعاء الخلفية كصورة محلية ثابتة */
        .card-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .content-layer { position: relative; z-index: 10; padding: 3rem 2rem; text-align: center; }
        .qr-wrapper { background: white; padding: 12px; border-radius: 2rem; display: inline-block; box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4">

    <div id="referral-card">
        <img src="my-bg.jpg" class="card-bg">
        
        <div class="content-layer">
            <div class="flex items-center justify-between mb-8">
                <img src="logo.png" alt="51Talk" class="h-14 w-auto object-contain">
                <div class="bg-white/90 px-6 py-2 rounded-2xl shadow-sm border border-blue-50">
                    <h2 id="display-consultant" class="text-xl font-black text-blue-900">البندري</h2>
                </div>
            </div>

            <div class="mb-8">
                <h3 class="text-blue-800 font-bold mb-3">إهداء حصري وخاص من <span id="display-student" class="text-red-600 font-black">........</span></h3>
                <h1 class="text-3xl md:text-4xl font-black text-blue-950 leading-tight mb-8">ابدأ تعلّم اللغة الانجليزية مع 51talk</h1>
                
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="flex items-center gap-2 bg-white/95 p-4 rounded-2xl shadow-sm border border-white">
                        <span class="text-xl">🌍</span> <p class="text-blue-950 font-bold text-[10px]">منصة عالمية ومعلمين أجانب</p>
                    </div>
                    <div class="flex items-center gap-2 bg-white/95 p-4 rounded-2xl shadow-sm border border-white">
                        <span class="text-xl">🎁</span> <p class="text-blue-950 font-bold text-[10px]">حصة تقييمية مجانية</p>
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <div class="qr-wrapper mb-4">
                    <div id="qrcode"></div>
                </div>
                <p class="text-blue-950 font-black mb-4 text-lg italic">امسح الكود للحجز المباشر</p>
                
                <div class="inline-flex items-center gap-2 bg-white/95 px-8 py-3 rounded-full border border-green-100 shadow-md mb-8">
                    <span id="display-phone" class="text-green-700 font-black text-2xl tracking-tighter">+962 77 555 2764</span>
                </div>

                <div class="flex items-center justify-center gap-8 bg-white/40 py-4 rounded-3xl border border-white/50">
                    <img src="tabby.png" class="h-6 w-auto">
                    <img src="tamara.png" class="h-6 w-auto">
                </div>
            </div>
        </div>
    </div>

    <div class="mt-8 w-full max-w-md bg-white p-6 rounded-3xl shadow-xl no-print mx-auto">
        <div class="space-y-4">
            <input type="text" id="input-student" placeholder="اسم الطالب" class="w-full bg-gray-50 border p-4 rounded-2xl text-right font-bold" oninput="updateCard()">
            <input type="text" id="input-consultant" placeholder="اسم المستشار" class="w-full bg-gray-50 border p-4 rounded-2xl text-right font-bold" oninput="updateCard()">
            <input type="text" id="input-phone" placeholder="962775552764" class="w-full bg-gray-50 border p-4 rounded-2xl text-right font-bold" oninput="updateCard()">
            <button onclick="saveCard()" class="w-full bg-blue-950 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-blue-900 transition-all">
                📸 حفظ الصورة النهائية
            </button>
        </div>
    </div>

    <script>
        let qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 170, height: 170, colorDark : "#172554", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
        });

        function updateCard() {
            const student = document.getElementById('input-student').value || "........";
            const consultant = document.getElementById('input-consultant').value || "البندري";
            const phone = document.getElementById('input-phone').value || "962775552764";
            document.getElementById('display-student').innerText = student;
            document.getElementById('display-consultant').innerText = consultant;
            document.getElementById('display-phone').innerText = phone.startsWith('+') ? phone : '+' + phone;
            const cleanPhone = phone.replace(/\s/g, '').replace('+', '');
            qrcode.clear();
            qrcode.makeCode(`https://wa.me/${cleanPhone}?text=${encodeURIComponent('مرحبا ' + consultant + '، انا من طرف ' + student + '، أرغب في حجز حصة تجريبية')}`);
        }

        function saveCard() {
            const card = document.getElementById('referral-card');
            const btn = event.currentTarget;
            btn.innerText = "جاري الحفظ..."; btn.disabled = true;

            html2canvas(card, {
                scale: 3,
                useCORS: true,
                backgroundColor: null,
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `51Talk-GiftCard-Fixed.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                btn.innerText = "📸 حفظ الصورة النهائية"; btn.disabled = false;
            });
        }
        updateCard();
    </script>
</body>
</html>
