<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>51Talk - Final Arabic Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* استخدام خطوط النظام الأساسية لضمان ثبات الحروف العربية عند الحفظ كصورة */
        body, * { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important; }
        
        .golden-card { 
            background: linear-gradient(135deg, #f6e8b1 0%, #fdf5d7 100%);
            border: 12px solid white;
        }

        /* حاوية خاصة لضمان عدم قلب الحروف */
        .stable-text {
            direction: rtl !important;
            unicode-bidi: bidi-override !important;
            text-align: center !important;
            display: block !important;
        }

        #qrcode canvas, #qrcode img {
            image-rendering: pixelated;
            display: block;
            margin: auto;
        }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4 bg-gray-50">

    <div id="referral-card" class="max-w-md w-full golden-card rounded-[3rem] overflow-hidden relative p-8 mx-auto text-center">
        
        <div class="flex flex-col items-center mb-6 gap-4">
            <img src="logo.png" alt="51Talk" class="h-16 w-auto">
            <div class="bg-white/80 px-6 py-2 rounded-xl border border-white w-full">
                <span class="stable-text text-[10px] text-blue-900/60 font-bold">المستشار التعليمي المعتمد</span>
                <span id="display-consultant" class="stable-text text-xl font-black text-blue-950">البندري</span>
            </div>
        </div>

        <div class="mb-6">
            <div class="stable-text text-blue-800 font-bold mb-2">إهداء حصري وخاص من <span id="display-student" class="text-red-600">........</span></div>
            <div class="stable-text text-2xl font-black text-blue-950 leading-tight mb-6 italic">ابدأ تعلّم اللغة الانجليزية مع 51talk</div>
            
            <div class="grid grid-cols-2 gap-2 mb-6">
                <div class="bg-white/50 p-2 rounded-xl border border-white text-[10px] font-bold">🌍 منصة عالمية</div>
                <div class="bg-white/50 p-2 rounded-xl border border-white text-[10px] font-bold">🎁 حصة مجانية</div>
                <div class="bg-white/50 p-2 rounded-xl border border-white text-[10px] font-bold">🗣️ تحدث بطلاقة</div>
                <div class="bg-white/50 p-2 rounded-xl border border-white text-[10px] font-bold">⏳ حصص فردية</div>
            </div>

            <div class="bg-blue-900/5 rounded-2xl p-4 border border-blue-900/10">
                <div class="stable-text text-[11px] font-bold text-blue-900/70 mb-3 underline">اختر مسارك التعليمي المفضل:</div>
                <div class="flex flex-wrap justify-center gap-2">
                    <span class="bg-white px-3 py-1 rounded-full text-[9px] font-bold text-blue-950 border border-blue-200">💼 إنجليزية الأعمال</span>
                    <span class="bg-white px-3 py-1 rounded-full text-[9px] font-bold text-blue-950 border border-blue-200">🌟 المسار الكلاسيكي</span>
                    <span class="bg-white px-3 py-1 rounded-full text-[9px] font-bold text-blue-950 border border-blue-200">🎓 تحضير الايلتس</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-center border-t border-blue-900/10 pt-6">
            <div class="bg-white p-2 rounded-2xl shadow-xl mb-3">
                <div id="qrcode"></div>
            </div>
            <div class="stable-text text-blue-950 font-bold text-xs mb-2">امسح الكود للحجز المباشر</div>
            
            <div class="flex items-center gap-2 mb-6 bg-white/90 px-4 py-1 rounded-full border border-green-200 shadow-sm font-bold text-green-700">
                <span>WhatsApp:</span>
                <span id="display-phone">962775552764+</span>
            </div>

            <div class="flex items-center gap-8 bg-white/60 px-8 py-3 rounded-2xl border border-white/50">
                <img src="tabby.png" alt="Tabby" class="h-6 w-auto">
                <img src="tamara.png" alt="Tamara" class="h-6 w-auto">
            </div>
        </div>
    </div>

    <div class="mt-6 bg-white p-6 rounded-3xl shadow-xl border w-full max-w-md no-print mx-auto mb-10">
        <div class="space-y-3">
            <input type="text" id="input-student" placeholder="اسم صديق الطالب" class="w-full bg-gray-50 border p-3 rounded-xl outline-none text-right font-bold" oninput="updateCard()">
            <input type="text" id="input-consultant" placeholder="اسم المستشار" class="w-full bg-gray-50 border p-3 rounded-xl outline-none text-right font-bold" oninput="updateCard()">
            <input type="text" id="input-phone" placeholder="962775552764" class="w-full bg-gray-50 border p-3 rounded-xl outline-none text-right font-bold" oninput="updateCard()">
            <button onclick="saveCard()" class="w-full bg-blue-950 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-900 transition-all">
                📸 حفظ البطاقة (إصلاح المسارات)
            </button>
        </div>
    </div>

    <script>
        let qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 140, height: 140, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
        });

        function updateCard() {
            const student = document.getElementById('input-student').value || "........";
            const consultant = document.getElementById('input-consultant').value || "البندري";
            const phone = document.getElementById('input-phone').value || "962775552764";
            
            document.getElementById('display-student').innerText = student;
            document.getElementById('display-consultant').innerText = consultant;
            document.getElementById('display-phone').innerText = phone.startsWith('+') ? phone : '+' + phone;
            
            const cleanPhone = phone.replace(/\s/g, '').replace('+', '');
            const message = `مرحبا استاذ ${consultant}، انا من طرف الأخ ${student}، أرغب في حجز حصة تجريبية`;
            qrcode.clear();
            qrcode.makeCode(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(message)}`);
        }

        function saveCard() {
            const card = document.getElementById('referral-card');
            const btn = event.currentTarget;
            btn.innerText = "جاري الحفظ..."; btn.disabled = true;

            setTimeout(() => {
                html2canvas(card, {
                    scale: 3,
                    useCORS: true,
                    backgroundColor: "#f9fafb",
                    onclone: (clonedDoc) => {
                        // إجبار المتصفح على تثبيت الاتجاه في النسخة المحفوظة
                        clonedDoc.querySelectorAll('.stable-text').forEach(el => {
                            el.style.direction = 'rtl';
                        });
                    }
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `51Talk-GiftCard-Fixed.png`;
                    link.href = canvas.toDataURL("image/png", 1.0);
                    link.click();
                    btn.innerText = "📸 حفظ البطاقة (إصلاح المسارات)"; btn.disabled = false;
                });
            }, 400);
        }
        updateCard();
    </script>
</body>
</html>
