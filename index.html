<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>51Talk - Professional Background HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #f3f4f6;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .golden-card { 
            /* تغيير الخلفية إلى نمط أزرق رخامي احترافي */
            background-image: url('https://img.freepik.com/free-vector/abstract-blue-geometric-shapes-background_1035-17545.jpg');
            background-size: cover;
            background-position: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
            border: 12px solid white;
        }
        #qrcode canvas, #qrcode img {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            display: block;
            margin: auto;
        }
        .qr-container {
            background: white;
            padding: 15px;
            border-radius: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 8px solid rgba(255, 255, 255, 0.2);
        }
        /* تعديل طفيف لبروز النصوص على الخلفية الجديدة */
        .text-shadow-light { text-shadow: 0 2px 4px rgba(255,255,255,0.8); }
        
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4">
    
    <div id="referral-card" class="max-w-2xl w-full golden-card rounded-[4rem] overflow-hidden p-8 md:p-12 mx-auto text-center">
        <div class="flex flex-col md:flex-row items-center justify-between mb-8 gap-6">
            <img src="logo.png" alt="51Talk" class="h-20 w-auto object-contain">
            <div class="bg-white/90 px-8 py-3 rounded-2xl border border-blue-100 shadow-sm">
                <h2 id="display-consultant" class="text-2xl font-black text-blue-900">البندري</h2>
            </div>
        </div>

        <div class="mb-8">
            <h3 class="text-blue-900 font-bold mb-3 bg-white/40 inline-block px-4 py-1 rounded-full">إهداء حصري وخاص من <span id="display-student" class="text-red-600 font-black">........</span></h3>
            <h1 class="text-3xl md:text-5xl font-black text-blue-950 leading-tight mb-10 drop-shadow-sm">ابدأ تعلّم اللغة الانجليزية مع 51talk</h1>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="flex items-center gap-3 bg-white/80 p-4 rounded-2xl border border-white text-right shadow-sm">
                    <span class="text-2xl">🌍</span> <p class="text-blue-950 font-bold text-[10px] md:text-xs">منصة عالمية ومعلمين أجانب</p>
                </div>
                <div class="flex items-center gap-3 bg-white/80 p-4 rounded-2xl border border-white text-right shadow-sm">
                    <span class="text-2xl">🎁</span> <p class="text-blue-950 font-bold text-[10px] md:text-xs">حصة تقييمية مجانية</p>
                </div>
                <div class="flex items-center gap-3 bg-white/80 p-4 rounded-2xl border border-white text-right shadow-sm">
                    <span class="text-2xl">🗣️</span> <p class="text-blue-950 font-bold text-[10px] md:text-xs">التركيز على التحدث بطلاقة</p>
                </div>
                <div class="flex items-center gap-3 bg-white/80 p-4 rounded-2xl border border-white text-right shadow-sm">
                    <span class="text-2xl">⏳</span> <p class="text-blue-950 font-bold text-[10px] md:text-xs">حصص فردية وأوقات مرنة</p>
                </div>
            </div>

            <div class="bg-white/30 backdrop-blur-sm rounded-[2.5rem] p-6 border border-white/50">
                <div class="flex flex-wrap justify-center gap-3">
                    <div class="bg-blue-900 text-white px-5 py-2 rounded-full text-xs font-black shadow-sm">💼 إنجليزية الأعمال</div>
                    <div class="bg-blue-800 text-white px-5 py-2 rounded-full text-xs font-black shadow-sm">🌟 المسار الكلاسيكي</div>
                    <div class="bg-blue-700 text-white px-5 py-2 rounded-full text-xs font-black shadow-sm">🎓 تحضير الايلتس</div>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-center border-t border-blue-900/10 pt-10">
            <div class="qr-container mb-6">
                <div id="qrcode"></div>
            </div>
            <p class="text-blue-950 font-black mb-4 text-xl italic">امسح الكود للحجز المباشر</p>
            
            <div class="flex items-center gap-3 mb-10 bg-white/90 px-8 py-3 rounded-full border border-blue-200 shadow-md">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                <span id="display-phone" class="text-blue-900 font-black text-2xl tracking-tighter">+962 77 555 2764</span>
            </div>

            <div class="flex items-center gap-12 bg-white/80 px-12 py-5 rounded-[2.5rem] border border-white shadow-sm">
                <img src="tabby.png" alt="Tabby" class="h-8 w-auto">
                <div class="w-px h-10 bg-blue-900/10"></div>
                <img src="tamara.png" alt="Tamara" class="h-8 w-auto">
            </div>
        </div>
    </div>

    <div class="mt-8 bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md no-print text-center border-t-8 border-blue-900">
        <div class="space-y-4">
            <input type="text" id="input-student" placeholder="اسم صديق الطالب" class="w-full bg-gray-50 border-2 p-4 rounded-2xl outline-none text-right font-bold" oninput="updateCard()">
            <input type="text" id="input-consultant" placeholder="اسم المستشار" class="w-full bg-gray-50 border-2 p-4 rounded-2xl outline-none text-right font-bold" oninput="updateCard()">
            <input type="text" id="input-phone" placeholder="962775552764" class="w-full bg-gray-50 border-2 p-4 rounded-2xl outline-none text-right font-bold" oninput="updateCard()">
            <button onclick="saveCard()" class="w-full bg-blue-900 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-950 flex items-center justify-center gap-3 transition-all">
                📸 حفظ الصورة (تصميم عصري جديد)
            </button>
        </div>
    </div>

    <script>
        let qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 200, height: 200, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
        });

        function updateCard() {
            const student = document.getElementById('input-student').value || "........";
            const consultant = document.getElementById('input-consultant').value || "البندري";
            const phone = document.getElementById('input-phone').value || "962775552764";
            
            document.getElementById('display-student').innerText = student;
            document.getElementById('display-consultant').innerText = consultant;
            document.getElementById('display-phone').innerText = phone.startsWith('+') ? phone : '+' + phone;
            
            const cleanPhone = phone.replace(/\s/g, '').replace('+', '');
            const message = `مرحبا استاذ ${consultant}، انا من طرف الأخ ${student}، أرغب في حجز حصة تجريبية`;
            qrcode.clear();
            qrcode.makeCode(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(message)}`);
        }

        function saveCard() {
            const card = document.getElementById('referral-card');
            const btn = event.currentTarget;
            btn.innerText = "جاري المعالجة..."; btn.disabled = true;

            setTimeout(() => {
                html2canvas(card, {
                    scale: 4, 
                    useCORS: true, 
                    backgroundColor: null,
                    imageTimeout: 0,
                    logging: false,
                    onclone: (clonedDoc) => {
                        clonedDoc.querySelectorAll('p, h2, h3, h1').forEach(el => { el.style.direction = 'rtl'; });
                    }
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `51Talk-GiftCard-Premium.png`;
                    link.href = canvas.toDataURL("image/png", 1.0);
                    link.click();
                    btn.innerText = "📸 حفظ الصورة (تصميم عصري جديد)"; btn.disabled = false;
                });
            }, 500);
        }
        updateCard();
    </script>
</body>
</html>
