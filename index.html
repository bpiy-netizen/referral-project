<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع الإحالة - 51Talk</title>

            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/51Talk_logo.svg/512px-51Talk_logo.svg.png" alt="51Talk Logo" class="h-10 w-auto">
            
            <div class="text-center md:text-left bg-white/60 px-6 py-2 rounded-2xl border border-white/50 shadow-sm">
                <p class="text-[10px] text-gray-500 font-bold uppercase">المستشار التعليمي:</p>
                <h2 id="display-name" class="text-xl font-bold text-blue-950">البندري</h2>
            </div>
        </div>

        <div class="text-center mb-10">
            <h3 class="text-blue-800 font-bold mb-2">إهداء حصري وخاص</h3>
            <h1 class="text-3xl md:text-5xl font-black text-blue-950 leading-tight mb-8">ابدأ تعلّم اللغة الانجليزية مع 51talk</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-right max-w-xl mx-auto">
                <div class="flex items-center gap-3 bg-white/40 p-3 rounded-xl border border-white/50">
                    <span class="text-xl">🌍</span>
                    <p class="text-gray-800 text-sm font-bold">منصة عالمية ومعلمين أجانب</p>
                </div>
                <div class="flex items-center gap-3 bg-white/40 p-3 rounded-xl border border-white/50">
                    <span class="text-xl">🎁</span>
                    <p class="text-gray-800 text-sm font-bold">حصة تجريبية مجانية تماماً</p>
                </div>
            </div>
        </div>

            <div class="bg-white p-4 rounded-[2.5rem] shadow-xl mb-4 border-4 border-blue-900">
                <div id="qrcode"></div>

            </div>
        </div>
    </div>

    <div class="mt-12 bg-white p-8 rounded-3xl shadow-2xl border border-gray-200 w-full max-w-md no-print">
        <h3 class="font-black text-blue-900 mb-6 text-center border-b pb-4">تعديل بيانات المستشار</h3>
        <div class="space-y-4">
            <input type="text" id="input-name" placeholder="اسم المستشار" class="w-full bg-gray-50 border p-4 rounded-2xl focus:ring-2 focus:ring-yellow-500 outline-none font-bold" oninput="updateCard()">
            <input type="text" id="input-phone" placeholder="رقم الواتساب (مثال: 962775552764)" class="w-full bg-gray-50 border p-4 rounded-2xl focus:ring-2 focus:ring-yellow-500 outline-none font-bold" oninput="updateCard()">
        </div>
    </div>

    <script>
        let qrcode = new QRCode(document.getElementById("qrcode"), {
            text: "https://wa.me/962775552764",
            width: 160,
            height: 160,
            colorDark : "#172554",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        function updateCard() {
            const name = document.getElementById('input-name').value || "البندري";
            const phone = document.getElementById('input-phone').value || "962775552764";
            document.getElementById('display-name').innerText = name;
            const cleanPhone = phone.replace(/\s/g, '').replace('+', '').replace(/^00/, '');
            qrcode.clear();
            qrcode.makeCode("https://wa.me/" + cleanPhone);
        }
    </script>
</body>
</html>
